name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test-and-lint:
    runs-on: ubuntu-latest
    steps:
      # Official Node 24 support
      - name: Checkout repo
        uses: actions/checkout@v5

      - name: Install uv
        # Using v5 here is fine; the warning is just a "heads up" 
        # that it will eventually need an update by September.
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      # Official Node 24 support
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version-file: "pyproject.toml"

      - name: Install dependencies
        run: uv sync --frozen

      - name: Run flake8
        run: uv run flake8 .

      - name: Run tests
        env:
          OPENAI_API_KEY: "sk-test-key"
        run: uv run pytest

  build:
    needs: [test-and-lint]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      
      - name: Build Docker image
        run: docker build -t faq-assistant .